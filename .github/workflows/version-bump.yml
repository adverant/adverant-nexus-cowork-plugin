name: Auto Version Bump

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude-plugin/plugin.json'
      - '.claude-plugin/marketplace.json'
      - 'server/package.json'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in plugin.json, marketplace.json, and package.json
        run: |
          # Read current version from plugin.json
          CURRENT=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "Current version: $CURRENT"

          # Bump patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "New version: $NEW_VERSION"

          # Update plugin.json
          jq --arg v "$NEW_VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json

          # Update marketplace.json
          jq --arg v "$NEW_VERSION" '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

          # Update server/package.json
          jq --arg v "$NEW_VERSION" '.version = $v' server/package.json > tmp.json && mv tmp.json server/package.json

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        id: bump

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json server/package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}" || echo "No changes to commit"
          git push
